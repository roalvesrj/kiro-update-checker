name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        uses: coactions/setup-xvfb@v1
        with:
          run: npm test

      - name: Package VSIX
        run: npx vsce package

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Extract changelog entry
        id: changelog
        shell: node {0}
        run: |
            const fs = require('fs');
          const version = JSON.parse(fs.readFileSync('package.json', 'utf8')).version;
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const sections = changelog.split(/\n(?=## )/);
          const versionHeading = `## [${version}]`;
          const found = sections.find(s => s.startsWith(versionHeading));
          const body = found ? found.trim() : `Version ${version} of Kiro Update Checker.`;
          const escaped = body.replace(/%/g, '%25').replace(/\n/g, '%0A').replace(/\r/g, '%0D');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `body=${escaped}\n`);

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: kiro-update-checker-${{ steps.version.outputs.version }}.vsix
