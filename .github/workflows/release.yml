name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        uses: coactions/setup-xvfb@v1
        with:
          run: npm test

      - name: Package VSIX
        run: npx vsce package

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Write release body
        run: |
          node -e "
            const fs = require('fs');
            const version = JSON.parse(fs.readFileSync('package.json', 'utf8')).version;
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const sections = changelog.split(/\n(?=## )/);
            const heading = '## [' + version + ']';
            const found = sections.find(s => s.startsWith(heading));
            const body = found ? found.trim() : 'Version ' + version + ' of Kiro Update Checker.';
            fs.writeFileSync('RELEASE_BODY.md', body);
          "

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: RELEASE_BODY.md
          files: kiro-update-checker-${{ steps.version.outputs.version }}.vsix

      - name: Publish to Open VSX
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: |
          if [ -z "$OVSX_TOKEN" ]; then
            echo "OVSX_TOKEN not set — skipping publish"
            exit 0
          fi
          npx ovsx publish kiro-update-checker-${{ steps.version.outputs.version }}.vsix -p "$OVSX_TOKEN"
